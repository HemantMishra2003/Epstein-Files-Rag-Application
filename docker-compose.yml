services:

  postgres:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: rag_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: redis-cache
    ports:
      - "6379:6379"

  backend:
    build: ./Pipeline
    container_name: pib-backend
    ports:
      - "8000:8000"

    env_file:
      - ./Pipeline/.env

    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: pib-frontend
    ports:
      - "5173:5173"

    depends_on:
      - backend